esphome:
  name: proto-smart-hvac

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Proto Smart Hvac"
    password: !secret ap_password

output:
  - platform: gpio
    pin: GPIO08
    id: led_gpio

remote_receiver:
  id: ir_receiver
  pin:
    number: GPIO00
    inverted: true
  # high 55% tolerance is recommended for some remote control units
  tolerance: 55%

remote_transmitter:
  pin: GPIO01
  carrier_duty_percent: 50%
  non_blocking: true

climate:
  - platform: climate_ir_lg
    name: "AC"
    header_high: 3200us
    header_low: 9900us
    bit_high: 480us # bit mark
    bit_one_low: 1600us
    bit_zero_low: 550us
    receiver_id: ir_receiver

# Blink para verificar que el firmware esta cargado correctamente
# interval:
