esphome:
  name: comedor-control-aire
  friendly_name: "Comedor Control Aire"

esp32:
  board: esp32-c3-devkitm-1
  variant: esp32c3
  framework:
    type: arduino

# Activar logging
logger:

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Control Aire Comedor"
    password: !secret ap_password

remote_receiver:
  id: ir_receiver
  pin:
    number: GPIO00
    inverted: true
  # high 55% tolerance is recommended for some remote control units
  tolerance: 55%

remote_transmitter:
  pin: GPIO01
  carrier_duty_percent: 50%
  non_blocking: true

# Esta configuracion de timings es para el protocolo LG2
climate:
  - platform: climate_ir_lg
    name: "Aire comedor"
    header_high: 3200us
    header_low: 9900us
    bit_high: 480us # bit mark
    bit_one_low: 1600us
    bit_zero_low: 550us
    receiver_id: ir_receiver

# Sensores con informacion general
sensor:
  # Sensor de Uptime
  - platform: uptime
    name: "Uptime"

  # Sensor señal WiFi
  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

button:
  - platform: safe_mode
    name: "Restart device (Safe Mode)"
  - platform: restart
    name: "Restart device"

